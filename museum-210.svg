<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#2d1a08"/>
  <!-- outer ring -->
  <circle cx="150" cy="150" r="130" fill="none" stroke="#c8960c" stroke-width="3"/>
  <circle cx="150" cy="150" r="120" fill="none" stroke="#c8960c" stroke-width="1"/>
  <!-- decorative dots on ring -->
  <circle cx="150" cy="22" r="4" fill="#c8960c"/>
  <circle cx="150" cy="278" r="4" fill="#c8960c"/>
  <circle cx="22" cy="150" r="4" fill="#c8960c"/>
  <circle cx="278" cy="150" r="4" fill="#c8960c"/>
  <circle cx="62" cy="62" r="3" fill="#c8960c"/>
  <circle cx="238" cy="62" r="3" fill="#c8960c"/>
  <circle cx="62" cy="238" r="3" fill="#c8960c"/>
  <circle cx="238" cy="238" r="3" fill="#c8960c"/>
  <!-- stone rod icon in center -->
  <rect x="136" y="72" width="28" height="90" rx="14" fill="#c8960c"/>
  <ellipse cx="150" cy="72" rx="14" ry="16" fill="#c8960c"/>
  <!-- star/sparkle accents -->
  <text x="90" y="188" font-family="serif" font-size="18" fill="#c8960c" text-anchor="middle">✦</text>
  <text x="210" y="188" font-family="serif" font-size="18" fill="#c8960c" text-anchor="middle">✦</text>
  <!-- museum name -->
  <text x="150" y="210" font-family="sans-serif" font-size="13" fill="#f0c060" text-anchor="middle" letter-spacing="1">飛騨みやがわ考古民俗館</text>
  <!-- visit text -->
  <text x="150" y="236" font-family="sans-serif" font-size="11" fill="#a07840" text-anchor="middle" letter-spacing="2">訪 問 記 念</text>
  <!-- bottom decoration -->
  <line x1="80" y1="248" x2="220" y2="248" stroke="#c8960c" stroke-width="0.8"/>
  <text x="150" y="262" font-family="monospace" font-size="10" fill="#806040" text-anchor="middle">SEKIBO SCANNER</text>
</svg>
