<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#2d1a08"/>

  <!-- outer ring -->
  <circle cx="150" cy="150" r="138" fill="none" stroke="#c8960c" stroke-width="2.5"/>
  <circle cx="150" cy="150" r="129" fill="none" stroke="#c8960c" stroke-width="1"/>

  <!-- decorative dots on ring -->
  <circle cx="150" cy="13"  r="4" fill="#c8960c"/>
  <circle cx="150" cy="287" r="4" fill="#c8960c"/>
  <circle cx="13"  cy="150" r="4" fill="#c8960c"/>
  <circle cx="287" cy="150" r="4" fill="#c8960c"/>
  <circle cx="52"  cy="52"  r="3.5" fill="#c8960c"/>
  <circle cx="248" cy="52"  r="3.5" fill="#c8960c"/>
  <circle cx="52"  cy="248" r="3.5" fill="#c8960c"/>
  <circle cx="248" cy="248" r="3.5" fill="#c8960c"/>

  <!-- sekibo-kun silhouette (gold) -->
  <g fill="#c8960c">
    <!-- head / top of stone rod (rounded dome) -->
    <ellipse cx="150" cy="52" rx="44" ry="20"/>
    <!-- main body (stone rod shape) -->
    <path d="M 106 50 L 106 185 Q 106 195 116 195 L 184 195 Q 194 195 194 185 L 194 50 Z"/>
    <!-- left arm -->
    <ellipse cx="93" cy="145" rx="15" ry="10"/>
    <!-- left hand -->
    <circle cx="82" cy="148" r="7"/>
    <!-- right arm -->
    <ellipse cx="207" cy="145" rx="15" ry="10"/>
    <!-- right hand -->
    <circle cx="218" cy="148" r="7"/>
    <!-- left leg -->
    <rect x="118" y="193" width="22" height="36" rx="11"/>
    <!-- right leg -->
    <rect x="160" y="193" width="22" height="36" rx="11"/>
  </g>

  <!-- sparkle accents -->
  <text x="83"  y="240" font-family="serif" font-size="20" fill="#c8960c" text-anchor="middle">✦</text>
  <text x="217" y="240" font-family="serif" font-size="20" fill="#c8960c" text-anchor="middle">✦</text>

  <!-- museum name -->
  <text x="150" y="258" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c8960c" text-anchor="middle" letter-spacing="1">飛騨みやがわ考古民俗館</text>

  <!-- visit text -->
  <text x="150" y="277" font-family="sans-serif" font-size="11" fill="#c8960c" text-anchor="middle" letter-spacing="4">訪 問 記 念</text>

  <!-- bottom decoration -->
  <line x1="75" y1="286" x2="225" y2="286" stroke="#c8960c" stroke-width="0.8"/>
  <text x="150" y="297" font-family="monospace" font-size="9" fill="#c8960c" text-anchor="middle" letter-spacing="2">SEKIBO SCANNER</text>
</svg>
