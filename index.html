<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石棒スキャナー</title>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { width:100%; height:100%; overflow:hidden; background:#fff8e7; font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Arial Rounded MT Bold',sans-serif; }

/* ── Screens ── */
.screen { display:none; position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; }
.screen.active { display:flex; flex-direction:column; }

/* ── HOME ── */
#homeScreen {
  background: linear-gradient(160deg, #fff8e7 0%, #ffe4b5 100%);
  align-items:center; justify-content:center; gap:0;
  padding: 32px 24px;
}
.home-deco {
  font-size: 5rem; margin-bottom: 8px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.home-title {
  font-size: 2.2rem; font-weight:900; letter-spacing:.1em;
  color: #5c3317;
  text-shadow: 3px 3px 0 #f0a040, 5px 5px 0 rgba(0,0,0,.1);
  margin-bottom: 6px; text-align:center;
}
.home-sub {
  font-size: .9rem; color: #a07040; letter-spacing:.12em;
  margin-bottom: 36px; text-align:center;
}
.home-stones {
  display:flex; gap:12px; margin-bottom:40px;
  justify-content:center;
}
.home-stone-mini canvas { border-radius:50%; }

.big-btn {
  width: 220px; padding: 18px;
  font-size: 1.2rem; font-weight:900; letter-spacing:.2em;
  border: none; border-radius: 50px;
  cursor: pointer; transition: transform .15s, box-shadow .15s;
  box-shadow: 0 6px 0 rgba(0,0,0,.2);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.big-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,.2); }
.btn-scan { background: linear-gradient(135deg,#ff6b6b,#ff8e53); color:#fff; margin-bottom:14px; }
.btn-collection { background: linear-gradient(135deg,#4ecdc4,#44b3ac); color:#fff; }
.collection-count {
  margin-top:16px; font-size:.8rem; color:#b08040;
  letter-spacing:.1em;
}

/* ── SCAN ── */
#scanScreen { background:#111; }
.scan-header {
  display:flex; align-items:center; padding:16px;
  background:rgba(0,0,0,.6); z-index:10; position:relative;
}
.back-btn {
  background:rgba(255,255,255,.15); border:none; color:#fff;
  border-radius:50%; width:38px; height:38px;
  font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.scan-title { flex:1; text-align:center; color:#fff; font-size:1rem; letter-spacing:.15em; font-weight:700; }

.video-wrap {
  position:relative; flex:1; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
#scanVideo { width:100%; height:100%; object-fit:cover; display:block; }

.scan-overlay {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.scan-frame {
  width: min(280px, 80vw); height: min(140px, 40vw);
  border: 3px solid rgba(255,255,255,.0);
  position:relative;
}
.scan-frame::before, .scan-frame::after,
.scan-corner-br, .scan-corner-bl {
  content:''; position:absolute; width:28px; height:28px;
  border-color:#ffcc00; border-style:solid;
}
.scan-frame::before  { top:0; left:0;   border-width:4px 0 0 4px; border-radius:6px 0 0 0; }
.scan-frame::after   { top:0; right:0;  border-width:4px 4px 0 0; border-radius:0 6px 0 0; }
.scan-corner-br { bottom:0; right:0; border-width:0 4px 4px 0; border-radius:0 0 6px 0; }
.scan-corner-bl { bottom:0; left:0;  border-width:0 0 4px 4px; border-radius:0 0 0 6px; }

.scan-line {
  position:absolute; left:0; right:0; height:3px;
  background:linear-gradient(90deg,transparent,#ffcc00,transparent);
  border-radius:2px;
  animation: scanMove 1.8s ease-in-out infinite;
  top:0;
}
@keyframes scanMove {
  0%   { top:0%; opacity:1; }
  50%  { top:100%; opacity:1; }
  51%  { top:100%; opacity:0; }
  52%  { top:0%;   opacity:0; }
  53%  { top:0%;   opacity:1; }
  100% { top:0%;   opacity:1; }
}

.scan-hint {
  position:absolute; bottom:24px; left:0; right:0; text-align:center;
  color:rgba(255,255,255,.8); font-size:.85rem; letter-spacing:.1em;
  background:rgba(0,0,0,.4); padding:10px;
}
.scan-result-flash {
  position:absolute; inset:0;
  background:rgba(255,255,220,.9);
  opacity:0; pointer-events:none;
  transition:opacity .1s;
}
.scan-result-flash.on { opacity:1; }

/* ── RESULT ── */
#resultScreen {
  background: linear-gradient(160deg,#fff8e7,#ffe4b5);
  align-items:center; justify-content:flex-start;
  padding: 0 0 24px;
}
.result-header {
  width:100%; display:flex; align-items:center; padding:16px;
  background:rgba(255,255,255,.5);
}
.result-body {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:12px 24px 24px; width:100%; max-width:420px; margin:0 auto;
}
.result-label {
  font-size:.85rem; letter-spacing:.2em; color:#a07040;
  margin-bottom:8px;
}
.result-label.dup { color:#888; }

.stone-card {
  background:#fff;
  border-radius:24px;
  padding:20px;
  width:100%; max-width:320px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  display:flex; flex-direction:column; align-items:center;
  gap:10px;
  animation: cardPop .5s cubic-bezier(.17,.89,.32,1.28) both;
  position:relative; overflow:hidden;
}
@keyframes cardPop { from{transform:scale(0) rotate(-5deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }

.rarity-badge {
  position:absolute; top:14px; right:14px;
  font-size:.75rem; font-weight:900; letter-spacing:.1em;
  padding:4px 10px; border-radius:20px;
}
.rarity-ふつう    { background:#e0e0e0; color:#666; }
.rarity-めずらしい { background:#b0e0f0; color:#2288aa; }
.rarity-レア      { background:linear-gradient(135deg,#ffe066,#ffaa00); color:#7a5000; }
.rarity-でんせつ  { background:linear-gradient(135deg,#ee88ff,#aa44ff); color:#fff; box-shadow:0 0 12px rgba(180,80,255,.5); animation:legendGlow 1.5s ease-in-out infinite; }
@keyframes legendGlow { 0%,100%{box-shadow:0 0 12px rgba(180,80,255,.5)} 50%{box-shadow:0 0 24px rgba(180,80,255,.9)} }

.card-canvas-wrap {
  width:120px; height:200px; display:flex; align-items:center; justify-content:center;
}

.card-name { font-size:1.3rem; font-weight:900; color:#3a2010; letter-spacing:.1em; }
.card-material { font-size:.85rem; color:#888; }
.card-divider { width:80%; height:1px; background:#f0e0c0; }

.card-stats { width:100%; display:flex; flex-direction:column; gap:5px; padding:0 8px; }
.stat-row { display:flex; align-items:center; gap:8px; }
.stat-lbl { font-size:.7rem; color:#aaa; width:44px; text-align:right; letter-spacing:.05em; }
.stat-bar-wrap { flex:1; height:8px; background:#f0ece8; border-radius:4px; overflow:hidden; }
.stat-bar { height:100%; border-radius:4px; transition:width .6s .3s ease; }
.stat-val { font-size:.72rem; color:#888; width:24px; text-align:right; }

.card-power {
  background:linear-gradient(135deg,#fff8e0,#fff0c0);
  border:1.5px solid #f0d080; border-radius:12px;
  padding:8px 16px; text-align:center; width:100%;
}
.power-lbl { font-size:.65rem; color:#c09040; letter-spacing:.15em; }
.power-name { font-size:1rem; font-weight:900; color:#7a5000; letter-spacing:.1em; }

.card-region { font-size:.75rem; color:#aaa; letter-spacing:.1em; }
.card-barcode { font-size:.6rem; color:#ccc; letter-spacing:.05em; font-family:monospace; }

.result-btns { display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px; margin-top:16px; }
.result-btn {
  padding:14px; font-size:1rem; font-weight:900; letter-spacing:.15em;
  border:none; border-radius:40px; cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.15); transition:transform .1s, box-shadow .1s;
}
.result-btn:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
.btn-again  { background:linear-gradient(135deg,#ff6b6b,#ff8e53); color:#fff; }
.btn-col    { background:linear-gradient(135deg,#4ecdc4,#44b3ac); color:#fff; }

/* ── COLLECTION ── */
#colScreen {
  background:linear-gradient(160deg,#fff8e7,#ffe4b5);
  padding:0;
}
.col-header {
  display:flex; align-items:center; padding:16px;
  background:rgba(255,255,255,.6); position:sticky; top:0; z-index:10;
  backdrop-filter:blur(8px);
}
.col-title { flex:1; text-align:center; font-size:1rem; letter-spacing:.2em; color:#5c3317; font-weight:900; }
.col-count-badge {
  background:#ff6b6b; color:#fff; border-radius:20px;
  padding:3px 10px; font-size:.75rem; font-weight:900;
}

.col-grid {
  display:grid; grid-template-columns: repeat(3, 1fr);
  gap:10px; padding:16px;
}
.col-item {
  background:#fff; border-radius:16px; padding:10px 6px 8px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  cursor:pointer; transition:transform .15s;
  position:relative; overflow:hidden;
}
.col-item:active { transform:scale(.95); }
.col-item-canvas { width:52px; height:88px; }
.col-item-name { font-size:.65rem; font-weight:900; color:#3a2010; text-align:center; line-height:1.2; }
.col-item-rarity { font-size:.55rem; }
.col-item-power { font-size:.58rem; color:#b08040; text-align:center; }
.col-item-new {
  position:absolute; top:4px; right:4px;
  background:#ff6b6b; color:#fff;
  font-size:.5rem; font-weight:900; padding:2px 5px; border-radius:8px;
  letter-spacing:.05em;
}

.col-empty {
  grid-column:1/-1; text-align:center; padding:60px 20px;
  color:#c0a080; font-size:.9rem; letter-spacing:.1em; line-height:2;
}

/* ── Detail modal ── */
#detailModal {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.6); align-items:center; justify-content:center;
  padding:20px;
}
#detailModal.on { display:flex; }
.detail-inner {
  background:#fff; border-radius:24px; padding:24px 20px;
  width:100%; max-width:320px; max-height:90vh; overflow-y:auto;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  animation:cardPop .3s ease both;
}
.detail-close {
  align-self:flex-end; background:none; border:none;
  font-size:1.4rem; color:#aaa; cursor:pointer; line-height:1;
}

/* ── Toast ── */
#toast {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:rgba(40,20,0,.85); color:#fff; padding:10px 24px;
  border-radius:30px; font-size:.85rem; letter-spacing:.1em;
  z-index:200; opacity:0; transition:opacity .3s; pointer-events:none;
  white-space:nowrap;
}
#toast.show { opacity:1; }

/* ── Confetti ── */
#confettiCanvas {
  position:fixed; inset:0; pointer-events:none; z-index:50;
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="home-deco">🪨</div>
  <div class="home-title">石棒スキャナー</div>
  <div class="home-sub">バーコードから縄文の力を召喚せよ</div>
  <div class="home-stones" id="homeStones"></div>
  <button class="big-btn btn-scan" onclick="goScan()">📷 スキャンする</button>
  <button class="big-btn btn-collection" onclick="goCollection()">📚 コレクション</button>
  <div class="collection-count" id="homeCount"></div>
</div>

<!-- SCAN -->
<div class="screen" id="scanScreen">
  <div class="scan-header">
    <button class="back-btn" onclick="stopScan()">✕</button>
    <div class="scan-title">バーコードをスキャン</div>
    <div style="width:38px"></div>
  </div>
  <div class="video-wrap">
    <video id="scanVideo" playsinline muted></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="scan-corner-br"></div>
        <div class="scan-corner-bl"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scan-hint">商品・本などのバーコードを枠に合わせてね</div>
    <div class="scan-result-flash" id="scanFlash"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="result-header">
    <button class="back-btn" style="background:rgba(0,0,0,.1);color:#5c3317" onclick="goHome()">✕</button>
  </div>
  <div class="result-body">
    <div class="result-label" id="resultLabel">あたらしい石棒をゲット！</div>
    <div class="stone-card" id="stoneCard">
      <div class="rarity-badge" id="rarityBadge"></div>
      <div class="card-canvas-wrap"><canvas id="resultCanvas" width="100" height="180"></canvas></div>
      <div class="card-name" id="cardName"></div>
      <div class="card-material" id="cardMaterial"></div>
      <div class="card-divider"></div>
      <div class="card-stats" id="cardStats"></div>
      <div class="card-power">
        <div class="power-lbl">霊　力</div>
        <div class="power-name" id="cardPower"></div>
      </div>
      <div class="card-region" id="cardRegion"></div>
      <div class="card-barcode" id="cardBarcode"></div>
    </div>
    <div class="result-btns">
      <button class="result-btn btn-again" onclick="goScan()">📷 もう一度スキャン</button>
      <button class="result-btn btn-col"   onclick="goCollection()">📚 コレクションを見る</button>
    </div>
  </div>
</div>

<!-- COLLECTION -->
<div class="screen" id="colScreen">
  <div class="col-header">
    <button class="back-btn" style="background:rgba(0,0,0,.1);color:#5c3317" onclick="goHome()">←</button>
    <div class="col-title">石棒図鑑</div>
    <div class="col-count-badge" id="colCountBadge">0</div>
  </div>
  <div class="col-grid" id="colGrid"></div>
</div>

<!-- Detail Modal -->
<div id="detailModal" onclick="closeDetail(event)">
  <div class="detail-inner" id="detailInner"></div>
</div>

<!-- Toast -->
<div id="toast"></div>
<!-- Confetti -->
<canvas id="confettiCanvas"></canvas>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const MATERIALS = [
  { id:'koku',  name:'黒曜石',  base:'#2a2a3e', shine:'#6666cc', accent:'#9999ff', bg:'#e8e8ff' },
  { id:'hisui', name:'翡翠',    base:'#1e5c3a', shine:'#3db86e', accent:'#6ee6a0', bg:'#e0fff0' },
  { id:'sagan', name:'砂岩',    base:'#b08040', shine:'#d4a860', accent:'#f0cc88', bg:'#fff8e0' },
  { id:'sekiei',name:'石英',    base:'#b0b8cc', shine:'#dde8f8', accent:'#ffffff', bg:'#f0f4ff' },
  { id:'aka',   name:'赤石',    base:'#a02020', shine:'#d05050', accent:'#ff8888', bg:'#ffe8e8' },
  { id:'ao',    name:'青石',    base:'#1a3c54', shine:'#3a7ca8', accent:'#7ac8f0', bg:'#e0f0ff' },
  { id:'kin',   name:'金石',    base:'#8a6408', shine:'#c89a20', accent:'#ffd700', bg:'#fffae0' },
  { id:'murasaki',name:'紫石',  base:'#5a1a7a', shine:'#9a40c0', accent:'#cc88ff', bg:'#f8e8ff' },
];

const POWERS = [
  '子孫繁栄','五穀豊穣','雨乞い成就','魔除け結界',
  '縁結び成就','武運長久','商売繁盛','無病息災',
  '開運招福','知恵授け','大漁祈願','旅安全',
  '火難除け','水難除け','家内安全','学業成就',
  '天下泰平','豊穣感謝','呪術封印','霊獣召喚',
];

const REGIONS = [
  '飛騨の森','富士の麓','陸奥の野','出雲の里',
  '難波の浦','常陸の沼','信濃の峰','三河の台地',
  '下野の原','陸前の浜','土佐の岬','紀伊の深山',
  '近江の湖岸','尾張の台','美濃の谷','越後の里',
];

const RARITY = [
  { name:'ふつう',    weight:60, stars:1 },
  { name:'めずらしい',weight:25, stars:2 },
  { name:'レア',      weight:12, stars:3 },
  { name:'でんせつ',  weight:3,  stars:4 },
];

const STONE_NAMES_PREFIX = ['大','小','古','神','霊','闇','光','風','水','炎','土','鉄','金','白','黒','赤','青','緑','紫','雷'];
const STONE_NAMES_SUFFIX = ['棒の守護','棒の魂','棒の秘宝','棒の力','棒の呪','棒の光','棒の影','棒の奇跡','棒の加護','棒の威'];

// ── Hash ─────────────────────────────────────────────────────────────────────
function hashCode(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h * 16777619) >>> 0;
  }
  return h;
}

function seededRand(seed) {
  // simple LCG
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 0xFFFFFFFF;
  };
}

function generateStone(barcode) {
  const h = hashCode(barcode);
  const rng = seededRand(h);

  const matIdx   = Math.floor(rng() * MATERIALS.length);
  const height   = 0.55 + rng() * 0.75;   // 0.55~1.3 relative scale
  const fatness  = 0.35 + rng() * 0.5;    // slim~fat
  const smoothness = rng();                 // rough~smooth

  // rarity
  const rv = rng() * 100;
  let cum = 0, rarityObj = RARITY[0];
  for (const r of RARITY) { cum += r.weight; if (rv < cum) { rarityObj = r; break; } }

  const powerIdx  = Math.floor(rng() * POWERS.length);
  const regionIdx = Math.floor(rng() * REGIONS.length);
  const prefixIdx = Math.floor(rng() * STONE_NAMES_PREFIX.length);
  const suffixIdx = Math.floor(rng() * STONE_NAMES_SUFFIX.length);

  // stats 1-99
  const statHeight   = Math.floor(height * 65 + rng() * 20 + 5);
  const statFat      = Math.floor(fatness * 80 + rng() * 15 + 5);
  const statSmooth   = Math.floor(smoothness * 70 + rng() * 25 + 5);
  const statReiki    = Math.floor(rng() * 80 + 10 + (rarityObj.stars - 1) * 5);

  return {
    barcode,
    id: h.toString(16).padStart(8,'0'),
    material: MATERIALS[matIdx],
    height, fatness, smoothness,
    rarity: rarityObj,
    power: POWERS[powerIdx],
    region: REGIONS[regionIdx],
    name: STONE_NAMES_PREFIX[prefixIdx] + STONE_NAMES_SUFFIX[suffixIdx],
    stats: { height:statHeight, fat:statFat, smooth:statSmooth, reiki:statReiki },
    ts: Date.now(),
    isNew: true,
  };
}

// ── Stone Canvas Drawing ──────────────────────────────────────────────────────
function drawStoneOnCanvas(canvas, stone, opts = {}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const mat = stone.material;
  const ht = stone.height;      // height scale
  const ft = stone.fatness;     // fatness scale
  const sm = stone.smoothness;  // smoothness

  // dimensions
  const cw = W * (.28 + ft * .30);
  const ch = H * (.62 + ht * .25);
  const cx = W / 2;
  const cy = H / 2 + H * .05;

  // top of stone
  const top  = cy - ch / 2;
  const bot  = cy + ch / 2;
  const headR = cw * (.55 + sm * .15);
  const bodyHalf = cw * .48;
  const baseHalf = cw * .32;

  // shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.25)';
  ctx.shadowBlur = 14;
  ctx.shadowOffsetY = 6;

  // Shape path
  ctx.beginPath();
  ctx.arc(cx, top + headR, headR, Math.PI, 0);
  ctx.bezierCurveTo(
    cx + bodyHalf * 1.1, top + headR + ch * .25,
    cx + bodyHalf,       top + ch * .55,
    cx + baseHalf,       bot
  );
  ctx.lineTo(cx - baseHalf, bot);
  ctx.bezierCurveTo(
    cx - bodyHalf,       top + ch * .55,
    cx - bodyHalf * 1.1, top + headR + ch * .25,
    cx - headR,          top + headR
  );
  ctx.closePath();

  // Fill
  const grad = ctx.createLinearGradient(cx - cw, top, cx + cw * .4, bot);
  grad.addColorStop(0,   mat.shine);
  grad.addColorStop(.35, mat.base);
  grad.addColorStop(.8,  mat.base);
  grad.addColorStop(1,   darken(mat.base, .6));
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();

  // Clip for inner effects
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, top + headR, headR, Math.PI, 0);
  ctx.bezierCurveTo(
    cx + bodyHalf * 1.1, top + headR + ch * .25,
    cx + bodyHalf,       top + ch * .55,
    cx + baseHalf,       bot
  );
  ctx.lineTo(cx - baseHalf, bot);
  ctx.bezierCurveTo(
    cx - bodyHalf,       top + ch * .55,
    cx - bodyHalf * 1.1, top + headR + ch * .25,
    cx - headR,          top + headR
  );
  ctx.closePath();
  ctx.clip();

  // Texture (rough = dots, smooth = streak)
  if (sm < .4) {
    // rough pitting
    const rng2 = seededRand(hashCode(stone.barcode + 'tex'));
    for (let i = 0; i < 40; i++) {
      const tx = cx - cw + rng2() * cw * 2;
      const ty = top + rng2() * ch;
      ctx.fillStyle = `rgba(0,0,0,${.06 + rng2() * .06})`;
      ctx.beginPath(); ctx.arc(tx, ty, .8 + rng2() * 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Highlight streak
  const hlGrad = ctx.createLinearGradient(cx - cw * .3, top, cx, bot);
  hlGrad.addColorStop(0,   `rgba(255,255,255,${.04 + sm * .18})`);
  hlGrad.addColorStop(.3,  `rgba(255,255,255,${.12 + sm * .25})`);
  hlGrad.addColorStop(.55, `rgba(255,255,255,.0)`);
  ctx.fillStyle = hlGrad;
  ctx.fillRect(0, 0, W, H);

  // Legend sparkle
  if (stone.rarity.name === 'でんせつ') {
    ctx.fillStyle = `rgba(255,220,80,.18)`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();

  // Outline
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, top + headR, headR, Math.PI, 0);
  ctx.bezierCurveTo(
    cx + bodyHalf * 1.1, top + headR + ch * .25,
    cx + bodyHalf,       top + ch * .55,
    cx + baseHalf,       bot
  );
  ctx.lineTo(cx - baseHalf, bot);
  ctx.bezierCurveTo(
    cx - bodyHalf,       top + ch * .55,
    cx - bodyHalf * 1.1, top + headR + ch * .25,
    cx - headR,          top + headR
  );
  ctx.closePath();
  ctx.strokeStyle = darken(mat.base, .7);
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function darken(hex, factor) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

// ── Collection Storage ────────────────────────────────────────────────────────
function loadCollection() {
  try { return JSON.parse(localStorage.getItem('sekiboCollection') || '[]'); }
  catch(e) { return []; }
}
function saveCollection(col) {
  localStorage.setItem('sekiboCollection', JSON.stringify(col));
}
function addToCollection(stone) {
  const col = loadCollection();
  const existing = col.find(s => s.id === stone.id);
  if (existing) {
    existing.count = (existing.count || 1) + 1;
    saveCollection(col);
    return false; // duplicate
  }
  stone.count = 1;
  col.unshift(stone);
  saveCollection(col);
  return true; // new
}

// ── Screen navigation ─────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopScan();
  showScreen('homeScreen');
  updateHomeCount();
}

function updateHomeCount() {
  const col = loadCollection();
  const el = document.getElementById('homeCount');
  el.textContent = col.length === 0 ? 'まだ石棒がない。スキャンしてみよう！' : `コレクション：${col.length}本の石棒`;
  renderHomeStones(col.slice(0,5));
}

function renderHomeStones(col) {
  const wrap = document.getElementById('homeStones');
  wrap.innerHTML = '';
  col.forEach(s => {
    const div = document.createElement('div');
    div.className = 'home-stone-mini';
    const cvs = document.createElement('canvas');
    cvs.width = 36; cvs.height = 60;
    div.appendChild(cvs);
    wrap.appendChild(div);
    drawStoneOnCanvas(cvs, s);
  });
}

// ── SCAN ──────────────────────────────────────────────────────────────────────
let codeReader = null;
let scanning = false;

async function goScan() {
  showScreen('scanScreen');
  await startScan();
}

async function startScan() {
  if (scanning) return;
  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    scanning = true;
    await codeReader.decodeFromVideoDevice(null, 'scanVideo', (result, err) => {
      if (result && scanning) {
        scanning = false;
        onBarcodeDetected(result.getText());
      }
    });
  } catch(e) {
    showToast('カメラを起動できませんでした');
    console.error(e);
    goHome();
  }
}

function stopScan() {
  scanning = false;
  if (codeReader) {
    try { codeReader.reset(); } catch(e) {}
    codeReader = null;
  }
}

function onBarcodeDetected(barcode) {
  stopScan();
  // flash
  const flash = document.getElementById('scanFlash');
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 200);

  setTimeout(() => {
    const stone = generateStone(barcode);
    const isNew = addToCollection(stone);
    showResult(stone, isNew);
  }, 300);
}

// ── RESULT ───────────────────────────────────────────────────────────────────
function showResult(stone, isNew) {
  showScreen('resultScreen');

  // label
  const lbl = document.getElementById('resultLabel');
  lbl.textContent = isNew ? '✨ あたらしい石棒をゲット！' : '📦 すでに持っている石棒だ！';
  lbl.className = 'result-label' + (isNew ? '' : ' dup');

  // rarity badge
  const badge = document.getElementById('rarityBadge');
  badge.textContent = stone.rarity.name;
  badge.className = 'rarity-badge rarity-' + stone.rarity.name;

  // canvas
  const cvs = document.getElementById('resultCanvas');
  drawStoneOnCanvas(cvs, stone);

  // text
  document.getElementById('cardName').textContent = stone.name;
  document.getElementById('cardMaterial').textContent = stone.material.name + ' 製';
  document.getElementById('cardPower').textContent = stone.power;
  document.getElementById('cardRegion').textContent = '📍 ' + stone.region + ' 出土';
  document.getElementById('cardBarcode').textContent = 'バーコード：' + stone.barcode;

  // stats
  const statsEl = document.getElementById('cardStats');
  statsEl.innerHTML = '';
  const statDefs = [
    { lbl:'たかさ', val:stone.stats.height, color:'#4ecdc4' },
    { lbl:'ふとさ', val:stone.stats.fat,    color:'#ff6b6b' },
    { lbl:'なめらか', val:stone.stats.smooth, color:'#95e1d3' },
    { lbl:'霊力',   val:stone.stats.reiki,  color:'#f38630' },
  ];
  for (const sd of statDefs) {
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `
      <div class="stat-lbl">${sd.lbl}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:0%;background:${sd.color}" data-val="${sd.val}"></div></div>
      <div class="stat-val">${sd.val}</div>`;
    statsEl.appendChild(row);
  }
  // animate bars
  requestAnimationFrame(() => {
    statsEl.querySelectorAll('.stat-bar').forEach(bar => {
      bar.style.width = bar.dataset.val + '%';
    });
  });

  // card bg
  document.getElementById('stoneCard').style.background = stone.material.bg || '#fff';

  // card pop animation reset
  const card = document.getElementById('stoneCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  if (isNew && stone.rarity.stars >= 3) {
    setTimeout(() => launchConfetti(stone.material.accent), 400);
  }
}

// ── COLLECTION ────────────────────────────────────────────────────────────────
function goCollection() {
  stopScan();
  showScreen('colScreen');
  renderCollection();
}

function renderCollection() {
  const col = loadCollection();
  const grid = document.getElementById('colGrid');
  const badge = document.getElementById('colCountBadge');
  badge.textContent = col.length;
  grid.innerHTML = '';

  if (col.length === 0) {
    grid.innerHTML = '<div class="col-empty">まだ石棒がない…<br>バーコードをスキャンして<br>石棒を集めよう！</div>';
    return;
  }

  col.forEach(stone => {
    const item = document.createElement('div');
    item.className = 'col-item';
    item.style.background = stone.material.bg || '#fff';

    const cvs = document.createElement('canvas');
    cvs.className = 'col-item-canvas';
    cvs.width = 52; cvs.height = 88;
    item.appendChild(cvs);

    const stars = '★'.repeat(stone.rarity.stars) + '☆'.repeat(4 - stone.rarity.stars);
    item.innerHTML += `
      <div class="col-item-name">${stone.name}</div>
      <div class="col-item-rarity" style="color:${rarityColor(stone.rarity.name)}">${stone.rarity.name}</div>
      <div class="col-item-power">${stone.power}</div>
    `;
    if (stone.isNew) {
      const nb = document.createElement('div');
      nb.className = 'col-item-new'; nb.textContent = 'NEW';
      item.appendChild(nb);
    }
    if ((stone.count||1) > 1) {
      const cb = document.createElement('div');
      cb.style.cssText = 'position:absolute;bottom:4px;right:6px;font-size:.55rem;color:#888;';
      cb.textContent = '×' + stone.count;
      item.appendChild(cb);
    }

    item.addEventListener('click', () => openDetail(stone));
    grid.appendChild(item);
    drawStoneOnCanvas(cvs, stone);
  });

  // clear isNew flags
  const updated = col.map(s => ({ ...s, isNew:false }));
  saveCollection(updated);
}

function rarityColor(name) {
  return { 'ふつう':'#999', 'めずらしい':'#2288aa', 'レア':'#cc8800', 'でんせつ':'#9944dd' }[name] || '#999';
}

// ── Detail Modal ──────────────────────────────────────────────────────────────
function openDetail(stone) {
  const modal = document.getElementById('detailModal');
  const inner = document.getElementById('detailInner');

  const statDefs = [
    { lbl:'たかさ', val:stone.stats.height, color:'#4ecdc4' },
    { lbl:'ふとさ', val:stone.stats.fat,    color:'#ff6b6b' },
    { lbl:'なめらか', val:stone.stats.smooth, color:'#95e1d3' },
    { lbl:'霊力',   val:stone.stats.reiki,  color:'#f38630' },
  ];
  const statsHTML = statDefs.map(sd => `
    <div class="stat-row">
      <div class="stat-lbl">${sd.lbl}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${sd.val}%;background:${sd.color}"></div></div>
      <div class="stat-val">${sd.val}</div>
    </div>`).join('');

  inner.innerHTML = `
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <canvas id="detailCanvas" width="100" height="180"></canvas>
    <div class="rarity-badge rarity-${stone.rarity.name}" style="position:static;margin-bottom:4px">${stone.rarity.name}</div>
    <div class="card-name">${stone.name}</div>
    <div class="card-material">${stone.material.name} 製</div>
    <div class="card-divider" style="width:80%;height:1px;background:#f0e0c0;margin:4px 0"></div>
    <div class="card-stats" style="width:100%">${statsHTML}</div>
    <div class="card-power" style="background:linear-gradient(135deg,#fff8e0,#fff0c0);border:1.5px solid #f0d080;border-radius:12px;padding:8px 16px;text-align:center;width:100%">
      <div class="power-lbl">霊　力</div>
      <div class="power-name">${stone.power}</div>
    </div>
    <div class="card-region">📍 ${stone.region} 出土</div>
    <div class="card-barcode">バーコード：${stone.barcode}</div>
    ${(stone.count||1)>1 ? `<div style="font-size:.75rem;color:#aaa">所持数：${stone.count}本</div>` : ''}
  `;

  modal.classList.add('on');
  const cvs = document.getElementById('detailCanvas');
  drawStoneOnCanvas(cvs, stone);
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById('detailModal')) {
    document.getElementById('detailModal').classList.remove('on');
  }
}

// ── Confetti ──────────────────────────────────────────────────────────────────
let confettiAnim = null;
function launchConfetti(color) {
  const cvs = document.getElementById('confettiCanvas');
  cvs.width = window.innerWidth;
  cvs.height = window.innerHeight;
  const ctx = cvs.getContext('2d');
  const pieces = Array.from({length:80}, () => ({
    x: Math.random() * cvs.width,
    y: -10 - Math.random() * 40,
    vy: 2 + Math.random() * 4,
    vx: (Math.random() - .5) * 3,
    rot: Math.random() * Math.PI * 2,
    rv: (Math.random() - .5) * .2,
    w: 6 + Math.random() * 8,
    h: 3 + Math.random() * 5,
    col: [color, '#ffcc00', '#ff6b6b', '#4ecdc4', '#ffffff'][Math.floor(Math.random() * 5)],
    life: 1,
  }));
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  function frame() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    let alive = false;
    for (const p of pieces) {
      p.x += p.vx; p.y += p.vy; p.rot += p.rv;
      if (p.y < cvs.height + 20) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.col;
      ctx.globalAlpha = Math.min(1, (cvs.height - p.y) / cvs.height * 3);
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (alive) confettiAnim = requestAnimationFrame(frame);
    else { ctx.clearRect(0, 0, cvs.width, cvs.height); confettiAnim = null; }
  }
  frame();
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateHomeCount();
</script>
