<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石棒スキャナー</title>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { width:100%; height:100%; overflow:hidden; background:#fff8e7; font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Arial Rounded MT Bold',sans-serif; }

.screen { display:none; position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; }
.screen.active { display:flex; flex-direction:column; }

/* ── HOME ── */
#homeScreen {
  background:linear-gradient(160deg,#fff8e7 0%,#ffe4b5 100%);
  align-items:center; justify-content:center; padding:32px 24px;
}
.home-deco { font-size:5rem; margin-bottom:8px; animation:bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.home-title {
  font-size:2.2rem; font-weight:900; letter-spacing:.1em; color:#5c3317;
  text-shadow:3px 3px 0 #f0a040,5px 5px 0 rgba(0,0,0,.1);
  margin-bottom:6px; text-align:center;
}
.home-sub { font-size:.9rem; color:#a07040; letter-spacing:.12em; margin-bottom:36px; text-align:center; }
.home-stones { display:flex; gap:12px; margin-bottom:40px; justify-content:center; }
.big-btn {
  width:220px; padding:18px; font-size:1.2rem; font-weight:900; letter-spacing:.2em;
  border:none; border-radius:50px; cursor:pointer;
  transition:transform .15s,box-shadow .15s; box-shadow:0 6px 0 rgba(0,0,0,.2);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.big-btn:active { transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.2); }
.btn-scan      { background:linear-gradient(135deg,#ff6b6b,#ff8e53); color:#fff; margin-bottom:14px; }
.btn-collection{ background:linear-gradient(135deg,#4ecdc4,#44b3ac); color:#fff; }
.collection-count { margin-top:16px; font-size:.8rem; color:#b08040; letter-spacing:.1em; }

/* ── SCAN ── */
#scanScreen { background:#111; }
.scan-header {
  display:flex; align-items:center; padding:16px;
  background:rgba(0,0,0,.6); z-index:10; position:relative;
}
.back-btn {
  background:rgba(255,255,255,.15); border:none; color:#fff;
  border-radius:50%; width:38px; height:38px;
  font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.scan-title { flex:1; text-align:center; color:#fff; font-size:1rem; letter-spacing:.15em; font-weight:700; }
.video-wrap { position:relative; flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; }
#scanVideo { width:100%; height:100%; object-fit:cover; display:block; }
.scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.scan-frame { width:min(280px,80vw); height:min(140px,40vw); position:relative; }
.scan-frame::before,.scan-frame::after,.scan-corner-br,.scan-corner-bl {
  content:''; position:absolute; width:28px; height:28px; border-color:#ffcc00; border-style:solid;
}
.scan-frame::before { top:0;left:0;border-width:4px 0 0 4px;border-radius:6px 0 0 0; }
.scan-frame::after  { top:0;right:0;border-width:4px 4px 0 0;border-radius:0 6px 0 0; }
.scan-corner-br { bottom:0;right:0;border-width:0 4px 4px 0;border-radius:0 0 6px 0; }
.scan-corner-bl { bottom:0;left:0;border-width:0 0 4px 4px;border-radius:0 0 0 6px; }
.scan-line {
  position:absolute; left:0; right:0; height:3px;
  background:linear-gradient(90deg,transparent,#ffcc00,transparent);
  border-radius:2px; animation:scanMove 1.8s ease-in-out infinite; top:0;
}
@keyframes scanMove {
  0%{top:0%;opacity:1} 50%{top:100%;opacity:1} 51%{top:100%;opacity:0}
  52%{top:0%;opacity:0} 53%{top:0%;opacity:1} 100%{top:0%;opacity:1}
}
.scan-hint {
  position:absolute; bottom:24px; left:0; right:0; text-align:center;
  color:rgba(255,255,255,.8); font-size:.85rem; letter-spacing:.1em;
  background:rgba(0,0,0,.4); padding:10px;
}
.scan-result-flash { position:absolute; inset:0; background:rgba(255,255,220,.9); opacity:0; pointer-events:none; transition:opacity .1s; }
.scan-result-flash.on { opacity:1; }

/* ── RESULT ── */
#resultScreen { background:linear-gradient(160deg,#fff8e7,#ffe4b5); align-items:center; }
.result-header { width:100%; display:flex; align-items:center; padding:16px; background:rgba(255,255,255,.5); }
.result-body { flex:1; display:flex; flex-direction:column; align-items:center; padding:12px 24px 24px; width:100%; max-width:420px; margin:0 auto; }
.result-new-label {
  font-size:.85rem; letter-spacing:.2em; margin-bottom:10px;
  font-weight:700;
}

/* ── Stone Card ── */
.stone-card {
  background:#fff; border-radius:20px; width:100%; max-width:300px;
  box-shadow:0 8px 32px rgba(0,0,0,.13);
  overflow:hidden; position:relative;
  animation:cardPop .5s cubic-bezier(.17,.89,.32,1.28) both;
}
@keyframes cardPop { from{transform:scale(0) rotate(-5deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }

.card-header {
  padding:12px 14px 10px;
  display:flex; justify-content:space-between; align-items:center;
}
.card-no { font-size:.7rem; color:#bbb; letter-spacing:.1em; font-family:monospace; }
.card-rarity-badge {
  font-size:.7rem; font-weight:900; letter-spacing:.08em;
  padding:3px 10px; border-radius:20px;
}
.rarity-ふつう    { background:#e8e8e8; color:#888; }
.rarity-めずらしい{ background:#c8eaf8; color:#2288aa; }
.rarity-レア      { background:linear-gradient(135deg,#ffe066,#ffaa00); color:#7a5000; }
.rarity-でんせつ  { background:linear-gradient(135deg,#ee88ff,#aa44ff); color:#fff; animation:legendGlow 1.5s ease-in-out infinite; }
@keyframes legendGlow { 0%,100%{box-shadow:0 0 8px rgba(180,80,255,.4)} 50%{box-shadow:0 0 18px rgba(180,80,255,.9)} }

.card-stone-area {
  display:flex; justify-content:center; align-items:flex-end;
  padding:8px 0 12px;
  min-height:180px;
}

.card-body { padding:0 18px 18px; }
.card-name { font-size:1.5rem; font-weight:900; color:#2a1a0a; letter-spacing:.05em; margin-bottom:2px; }
.card-site { font-size:.72rem; color:#aaa; letter-spacing:.08em; margin-bottom:10px; }

.card-info-row {
  display:flex; gap:8px; margin-bottom:10px;
}
.info-chip {
  background:#f5f0ea; border-radius:20px; padding:5px 12px;
  font-size:.72rem; color:#7a5828; font-weight:700; letter-spacing:.05em;
}
.state-chip { background:var(--state-bg); color:var(--state-color); }

.card-note {
  font-size:.78rem; color:#888; line-height:1.6; letter-spacing:.04em;
  border-top:1px solid #f0ece8; padding-top:10px;
}

/* ── result buttons ── */
.result-btns { display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px; margin-top:16px; }
.result-btn {
  padding:14px; font-size:1rem; font-weight:900; letter-spacing:.15em;
  border:none; border-radius:40px; cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.15); transition:transform .1s,box-shadow .1s;
}
.result-btn:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
.btn-again { background:linear-gradient(135deg,#ff6b6b,#ff8e53); color:#fff; }
.btn-col   { background:linear-gradient(135deg,#4ecdc4,#44b3ac); color:#fff; }

/* ── COLLECTION ── */
#colScreen { background:linear-gradient(160deg,#fff8e7,#ffe4b5); padding:0; }
.col-header {
  display:flex; align-items:center; padding:16px;
  background:rgba(255,255,255,.6); position:sticky; top:0; z-index:10;
  backdrop-filter:blur(8px);
}
.col-title { flex:1; text-align:center; font-size:1rem; letter-spacing:.2em; color:#5c3317; font-weight:900; }
.col-count-badge { background:#ff6b6b; color:#fff; border-radius:20px; padding:3px 10px; font-size:.75rem; font-weight:900; }
.col-progress {
  padding:10px 16px 4px; display:flex; align-items:center; gap:10px;
}
.col-prog-track { flex:1; height:6px; background:#e8e0d0; border-radius:3px; overflow:hidden; }
.col-prog-bar   { height:100%; background:linear-gradient(90deg,#ff8e53,#ff6b6b); border-radius:3px; transition:width .4s; }
.col-prog-label { font-size:.7rem; color:#b08040; white-space:nowrap; }

.col-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:12px 16px 24px; }
.col-item {
  background:#fff; border-radius:14px; padding:10px 6px 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  box-shadow:0 3px 10px rgba(0,0,0,.08); cursor:pointer;
  transition:transform .15s; position:relative; overflow:hidden;
}
.col-item:active { transform:scale(.95); }
.col-item-name { font-size:.65rem; font-weight:900; color:#2a1a0a; text-align:center; line-height:1.2; }
.col-item-no   { font-size:.55rem; color:#ccc; font-family:monospace; }
.col-item-new  {
  position:absolute; top:4px; right:4px;
  background:#ff6b6b; color:#fff; font-size:.5rem; font-weight:900;
  padding:2px 5px; border-radius:8px;
}
.col-item-dup { position:absolute; bottom:5px; right:7px; font-size:.55rem; color:#bbb; }
.col-empty {
  grid-column:1/-1; text-align:center; padding:60px 20px;
  color:#c0a080; font-size:.9rem; letter-spacing:.1em; line-height:2;
}

/* ── Detail modal ── */
#detailModal { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.6); align-items:center; justify-content:center; padding:20px; }
#detailModal.on { display:flex; }
.detail-inner {
  background:#fff; border-radius:20px; width:100%; max-width:300px;
  max-height:90vh; overflow-y:auto;
  display:flex; flex-direction:column; align-items:center;
  animation:cardPop .3s ease both; overflow:hidden;
}
.detail-close-row { width:100%; display:flex; justify-content:flex-end; padding:12px 14px 0; }
.detail-close { background:none; border:none; font-size:1.3rem; color:#ccc; cursor:pointer; }

/* ── Toast ── */
#toast {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:rgba(40,20,0,.85); color:#fff; padding:10px 24px;
  border-radius:30px; font-size:.85rem; letter-spacing:.1em;
  z-index:200; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; }
#confettiCanvas { position:fixed; inset:0; pointer-events:none; z-index:50; }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="home-deco">🪨</div>
  <div class="home-title">石棒スキャナー</div>
  <div class="home-sub">バーコードから縄文の石棒を発掘せよ</div>
  <div class="home-stones" id="homeStones"></div>
  <button class="big-btn btn-scan" onclick="goScan()">📷 スキャンする</button>
  <button class="big-btn btn-collection" onclick="goCollection()">📚 図鑑を見る</button>
  <div class="collection-count" id="homeCount"></div>
</div>

<!-- SCAN -->
<div class="screen" id="scanScreen">
  <div class="scan-header">
    <button class="back-btn" onclick="stopScan()">✕</button>
    <div class="scan-title">バーコードをスキャン</div>
    <div style="width:38px"></div>
  </div>
  <div class="video-wrap">
    <video id="scanVideo" playsinline muted></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="scan-corner-br"></div>
        <div class="scan-corner-bl"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scan-hint">商品・本などのバーコードを枠に合わせてね</div>
    <div class="scan-result-flash" id="scanFlash"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="result-header">
    <button class="back-btn" style="background:rgba(0,0,0,.1);color:#5c3317" onclick="goHome()">✕</button>
  </div>
  <div class="result-body">
    <div class="result-new-label" id="resultLabel"></div>
    <div class="stone-card" id="stoneCard">
      <div class="card-header">
        <span class="card-no" id="cardNo"></span>
        <span class="card-rarity-badge" id="rarityBadge"></span>
      </div>
      <div class="card-stone-area"><canvas id="resultCanvas" width="100" height="160"></canvas></div>
      <div class="card-body">
        <div class="card-name" id="cardName"></div>
        <div class="card-site" id="cardSite"></div>
        <div class="card-info-row" id="cardInfoRow"></div>
        <div class="card-note" id="cardNote"></div>
      </div>
    </div>
    <div class="result-btns">
      <button class="result-btn btn-again" onclick="goScan()">📷 もう一度スキャン</button>
      <button class="result-btn btn-col"   onclick="goCollection()">📚 図鑑を見る</button>
    </div>
  </div>
</div>

<!-- COLLECTION -->
<div class="screen" id="colScreen">
  <div class="col-header">
    <button class="back-btn" style="background:rgba(0,0,0,.1);color:#5c3317" onclick="goHome()">←</button>
    <div class="col-title">石棒図鑑</div>
    <div class="col-count-badge" id="colCountBadge">0/30</div>
  </div>
  <div class="col-progress">
    <div class="col-prog-track"><div class="col-prog-bar" id="colProgBar" style="width:0%"></div></div>
    <div class="col-prog-label" id="colProgLabel">0 / 30 体</div>
  </div>
  <div class="col-grid" id="colGrid"></div>
</div>

<!-- Detail Modal -->
<div id="detailModal" onclick="closeDetail(event)">
  <div class="detail-inner" id="detailInner"></div>
</div>

<div id="toast"></div>
<canvas id="confettiCanvas"></canvas>

<script>
// ── 石棒スペシメンデータ（架空・後で本物に差し替え可能） ──────────────────────
// stateIdx: 0=原石 1=剥離 2=敲打 3=研磨
// rarityIdx: 0=ふつう 1=めずらしい 2=レア 3=でんせつ
const SPECIMENS = [
  { no:'001', name:'大王',     site:'塩屋金清神社遺跡', h:48.5, w:9.2,  stateIdx:3, rarityIdx:3, note:'飛騨最大級の研磨石棒。発掘時に周囲から歓声があがった。' },
  { no:'002', name:'小太郎',   site:'中橋遺跡',         h:12.4, w:5.8,  stateIdx:2, rarityIdx:0, note:'小ぶりだが精巧な敲打痕が残る。子どもの手のひらサイズ。' },
  { no:'003', name:'雷神',     site:'島遺跡',           h:35.2, w:7.6,  stateIdx:3, rarityIdx:2, note:'頭部に稲妻状の線刻が入る。儀礼用と推定される。' },
  { no:'004', name:'丸子',     site:'向町遺跡',         h:22.8, w:8.9,  stateIdx:1, rarityIdx:0, note:'丸みのある愛らしい形。剥離の跡がやさしい曲線を生む。' },
  { no:'005', name:'白鷹',     site:'松之木遺跡',       h:30.1, w:6.3,  stateIdx:3, rarityIdx:2, note:'石英が混じり白く輝く。研磨が丁寧で表面は鏡面に近い。' },
  { no:'006', name:'原始',     site:'宮川左岸遺跡',     h:18.6, w:10.2, stateIdx:0, rarityIdx:0, note:'ほぼ手を加えていない塩屋石の原石。自然の形そのまま。' },
  { no:'007', name:'細長',     site:'本郷ヶ原遺跡',     h:41.3, w:5.1,  stateIdx:3, rarityIdx:1, note:'異様に細長い研磨品。折れずに残ったのが奇跡といわれる。' },
  { no:'008', name:'ずんぐり', site:'塩屋金清神社遺跡', h:14.2, w:9.8,  stateIdx:2, rarityIdx:0, note:'太くて短い独特のフォルム。似た形がほかに見つかっていない。' },
  { no:'009', name:'深淵',     site:'下切遺跡',         h:27.5, w:7.2,  stateIdx:3, rarityIdx:2, note:'黒みが強く神秘的な光沢を放つ。暗がりで見ると吸い込まれそう。' },
  { no:'010', name:'若葉',     site:'中橋遺跡',         h:16.8, w:6.4,  stateIdx:1, rarityIdx:0, note:'剥離直後の状態で出土。縄文人の仕事の途中を覗いているよう。' },
  { no:'011', name:'巨人',     site:'坂下遺跡',         h:52.0, w:10.5, stateIdx:3, rarityIdx:3, note:'飛騨史上最大の石棒。出土時は土の中で立っていた。' },
  { no:'012', name:'稲荷',     site:'宮田遺跡',         h:23.4, w:7.8,  stateIdx:2, rarityIdx:1, note:'遺跡の祭祀区画のほぼ中央で発見。重要な儀礼に使われたか。' },
  { no:'013', name:'子守',     site:'向町遺跡',         h:9.6,  w:4.8,  stateIdx:3, rarityIdx:1, note:'掌にすっぽり収まる小型品。研磨は丁寧で愛用された形跡がある。' },
  { no:'014', name:'荒武者',   site:'島遺跡',           h:33.7, w:8.3,  stateIdx:1, rarityIdx:1, note:'表面に無数の剥離痕。力強い打撃の跡が残る豪快な一本。' },
  { no:'015', name:'月読',     site:'松之木遺跡',       h:28.9, w:6.9,  stateIdx:3, rarityIdx:2, note:'満月の夜に水田で発見されたと地元に伝わる縁起物。' },
  { no:'016', name:'双子A',    site:'塩屋金清神社遺跡', h:19.1, w:6.6,  stateIdx:2, rarityIdx:1, note:'同じ場所で同じ形の2本が並んで出土。相棒は双子B。' },
  { no:'017', name:'双子B',    site:'塩屋金清神社遺跡', h:19.3, w:6.7,  stateIdx:2, rarityIdx:1, note:'双子Aとほぼ同寸。数ミリの差が個性を生む。' },
  { no:'018', name:'山神',     site:'宮川左岸遺跡',     h:38.4, w:8.8,  stateIdx:3, rarityIdx:2, note:'山の神への奉納品と推定。遺跡の最高所で発見された。' },
  { no:'019', name:'砕けかけ', site:'本郷ヶ原遺跡',     h:20.5, w:7.1,  stateIdx:0, rarityIdx:0, note:'先端部が欠けた状態で出土。縄文時代にすでに割れていたらしい。' },
  { no:'020', name:'まんまる', site:'下切遺跡',         h:11.2, w:10.8, stateIdx:2, rarityIdx:1, note:'高さと幅がほぼ同じ球状。石棒というより石球に近い珍品。' },
  { no:'021', name:'仙人',     site:'坂下遺跡',         h:44.8, w:7.4,  stateIdx:3, rarityIdx:3, note:'縄文中期の最高傑作との呼び声が高い。研磨の完成度が別格。' },
  { no:'022', name:'赤鬼',     site:'宮田遺跡',         h:25.6, w:8.0,  stateIdx:0, rarityIdx:1, note:'酸化鉄の影響で赤みを帯びる。原石のままで強い存在感を放つ。' },
  { no:'023', name:'寝坊助',   site:'中橋遺跡',         h:17.3, w:8.5,  stateIdx:1, rarityIdx:0, note:'少し傾いた状態で出土。のんびりした雰囲気で発掘者に愛された。' },
  { no:'024', name:'飛騨の龍', site:'向町遺跡',         h:36.2, w:7.0,  stateIdx:3, rarityIdx:2, note:'頭部が龍の頭に見えると話題。縄文のドラゴンボールと呼ぶ人も。' },
  { no:'025', name:'古老',     site:'松之木遺跡',       h:29.8, w:8.2,  stateIdx:3, rarityIdx:2, note:'5000年前の出土と推定される最古級の一本。風格がにじみ出る。' },
  { no:'026', name:'ちびっこ', site:'宮川左岸遺跡',     h:7.4,  w:3.9,  stateIdx:2, rarityIdx:0, note:'確認されている完形品の中で最小クラス。かわいいと大人気。' },
  { no:'027', name:'霧の石',   site:'塩屋金清神社遺跡', h:31.5, w:7.7,  stateIdx:1, rarityIdx:1, note:'霧の朝に田んぼを耕していた農家が発見。百姓の縁起物に。' },
  { no:'028', name:'武将',     site:'本郷ヶ原遺跡',     h:40.0, w:9.1,  stateIdx:2, rarityIdx:2, note:'力強い敲打痕が全面に残る大型品。縄文の力強さの象徴。' },
  { no:'029', name:'おてんば', site:'島遺跡',           h:21.7, w:7.3,  stateIdx:1, rarityIdx:0, note:'斜めに欠けた個性的な形。完形でないのに妙に愛嬌がある。' },
  { no:'030', name:'千年守',   site:'坂下遺跡',         h:34.4, w:6.8,  stateIdx:3, rarityIdx:3, note:'千年以上完全な形で地中に眠り続けた。土の番人とも呼ばれる。' },
];

const STATES = [
  { id:'genseki', name:'原石', baseMod:.72, shineMod:.28, pitting:60, hlAlpha:.03, bg:'#f2ede8', color:'#9a7860', chipBg:'#ede8e2' },
  { id:'hakuri',  name:'剥離', baseMod:.88, shineMod:.55, pitting:34, hlAlpha:.09, bg:'#eeebe4', color:'#7a6848', chipBg:'#e4e0d6' },
  { id:'kouda',   name:'敲打', baseMod:1.0, shineMod:.78, pitting:14, hlAlpha:.16, bg:'#eae8e0', color:'#5a5040', chipBg:'#dedad0' },
  { id:'kenma',   name:'研磨', baseMod:1.08,shineMod:1.0, pitting:0,  hlAlpha:.32, bg:'#e8e6de', color:'#3a3028', chipBg:'#d4d0c4' },
];
const RARITY = [
  { name:'ふつう',    stars:1 },
  { name:'めずらしい',stars:2 },
  { name:'レア',      stars:3 },
  { name:'でんせつ',  stars:4 },
];
const SHIOYA = { base:'#7a7468', shine:'#a89e90', dark:'#3e3a36' };

// ── Hash ─────────────────────────────────────────────────────────────────────
function hashCode(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h;
}
function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 0xFFFFFFFF; };
}

// ── Stone generation ──────────────────────────────────────────────────────────
function generateStone(barcode) {
  const h = hashCode(barcode);
  const spec = SPECIMENS[h % SPECIMENS.length];
  return {
    barcode,
    id: h.toString(16).padStart(8,'0'),
    spec,
    state: STATES[spec.stateIdx],
    rarity: RARITY[spec.rarityIdx],
    ts: Date.now(),
    isNew: true,
  };
}

// ── Canvas drawing ────────────────────────────────────────────────────────────
function drawStoneOnCanvas(canvas, stone) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const st   = stone.state;
  const spec = stone.spec;

  // 実際の高さ/幅比率を形に反映
  const ratio  = Math.min(spec.h / spec.w, 7);   // 高さ÷幅（最大7）
  const ftNorm = Math.max(0, Math.min(1, 1 - (ratio - 1) / 6)); // 太さ：ratio小→太い

  const baseCol  = scaleColor(SHIOYA.base,  st.baseMod);
  const shineCol = scaleColor(SHIOYA.shine, st.shineMod);
  const darkCol  = SHIOYA.dark;

  const cw = W * (.28 + ftNorm * .26);
  const ch = Math.min(H * .92, H * (.40 + ratio * .08));
  const cx = W / 2;
  const cy = H / 2 + H * .04;
  const top = cy - ch / 2, bot = cy + ch / 2;
  const headR    = cw * .52;
  const bodyHalf = cw * .46;
  const baseHalf = cw * .30;

  function path() {
    ctx.beginPath();
    ctx.arc(cx, top + headR, headR, Math.PI, 0);
    ctx.bezierCurveTo(cx+bodyHalf*1.1, top+headR+ch*.25, cx+bodyHalf, top+ch*.55, cx+baseHalf, bot);
    ctx.lineTo(cx-baseHalf, bot);
    ctx.bezierCurveTo(cx-bodyHalf, top+ch*.55, cx-bodyHalf*1.1, top+headR+ch*.25, cx-headR, top+headR);
    ctx.closePath();
  }

  // 影
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.25)'; ctx.shadowBlur=12; ctx.shadowOffsetY=5;
  path();
  const grad = ctx.createLinearGradient(cx-cw, top, cx+cw*.5, bot);
  grad.addColorStop(0, shineCol); grad.addColorStop(.3, baseCol);
  grad.addColorStop(.85, baseCol); grad.addColorStop(1, darkCol);
  ctx.fillStyle=grad; ctx.fill();
  ctx.restore();

  // クリップ
  ctx.save(); path(); ctx.clip();

  // テクスチャ
  const rng2 = seededRand(hashCode(stone.barcode+'t'));
  for (let i=0; i<st.pitting; i++) {
    const tx=cx-cw*.9+rng2()*cw*1.8, ty=top+rng2()*ch;
    const tr=.6+rng2()*(st.id==='kouda'?2.2:1.2);
    ctx.fillStyle=`rgba(0,0,0,${.05+rng2()*.07})`;
    ctx.beginPath();
    if (st.id==='kouda') ctx.ellipse(tx,ty,tr,tr*.5,rng2()*Math.PI,0,Math.PI*2);
    else ctx.arc(tx,ty,tr,0,Math.PI*2);
    ctx.fill();
  }

  // ハイライト
  const hl = ctx.createLinearGradient(cx-cw*.35, top, cx*.8, bot*.65);
  hl.addColorStop(0,`rgba(255,255,255,${st.hlAlpha*.5})`);
  hl.addColorStop(.25,`rgba(255,255,255,${st.hlAlpha})`);
  hl.addColorStop(.6,'rgba(255,255,255,0)');
  ctx.fillStyle=hl; ctx.fillRect(0,0,W,H);

  // 研磨：縦光沢
  if (st.id==='kenma') {
    const sg=ctx.createLinearGradient(cx-cw*.22,top,cx-cw*.06,bot);
    sg.addColorStop(0,'rgba(255,255,248,0)');
    sg.addColorStop(.35,'rgba(255,255,248,.18)');
    sg.addColorStop(.55,'rgba(255,255,248,.22)');
    sg.addColorStop(1,'rgba(255,255,248,0)');
    ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
  }
  // でんせつ
  if (stone.rarity.name==='でんせつ') { ctx.fillStyle='rgba(255,210,60,.12)'; ctx.fillRect(0,0,W,H); }
  ctx.restore();

  // アウトライン
  ctx.save(); path();
  ctx.strokeStyle=darkCol; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

function scaleColor(hex, f) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const c=v=>Math.min(255,Math.max(0,Math.round(v*f)));
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}

// ── Collection storage ────────────────────────────────────────────────────────
function loadCollection() { try{return JSON.parse(localStorage.getItem('sekiboCol')||'[]')}catch{return[]} }
function saveCollection(col) { localStorage.setItem('sekiboCol',JSON.stringify(col)); }
function addToCollection(stone) {
  const col=loadCollection();
  const ex=col.find(s=>s.spec.no===stone.spec.no);
  if (ex) { ex.count=(ex.count||1)+1; saveCollection(col); return false; }
  stone.count=1; col.unshift(stone); saveCollection(col); return true;
}

// ── Screens ───────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() { stopScan(); showScreen('homeScreen'); updateHomeCount(); }

function updateHomeCount() {
  const col=loadCollection();
  document.getElementById('homeCount').textContent =
    col.length===0 ? 'まだ石棒がない。スキャンしてみよう！' : `図鑑：${col.length} / ${SPECIMENS.length} 体`;
  renderHomeStones(col.slice(0,5));
}
function renderHomeStones(col) {
  const wrap=document.getElementById('homeStones');
  wrap.innerHTML='';
  col.forEach(s=>{
    const cvs=document.createElement('canvas');
    cvs.width=36; cvs.height=60;
    wrap.appendChild(cvs);
    drawStoneOnCanvas(cvs,s);
  });
}

// ── Scan ──────────────────────────────────────────────────────────────────────
let codeReader=null, scanning=false;
async function goScan() { showScreen('scanScreen'); await startScan(); }
async function startScan() {
  if(scanning) return;
  try {
    codeReader=new ZXing.BrowserMultiFormatReader(); scanning=true;
    await codeReader.decodeFromVideoDevice(null,'scanVideo',(result,err)=>{
      if(result&&scanning){ scanning=false; onBarcodeDetected(result.getText()); }
    });
  } catch(e) { showToast('カメラを起動できませんでした'); goHome(); }
}
function stopScan() {
  scanning=false;
  if(codeReader){try{codeReader.reset();}catch(e){} codeReader=null;}
}
function onBarcodeDetected(barcode) {
  stopScan();
  const flash=document.getElementById('scanFlash');
  flash.classList.add('on'); setTimeout(()=>flash.classList.remove('on'),200);
  setTimeout(()=>{ const stone=generateStone(barcode); const isNew=addToCollection(stone); showResult(stone,isNew); },300);
}

// ── Result ────────────────────────────────────────────────────────────────────
function showResult(stone, isNew) {
  showScreen('resultScreen');

  const lbl=document.getElementById('resultLabel');
  lbl.textContent= isNew ? '✨ あたらしい石棒を発掘！' : '📦 すでに持っている石棒だ！';
  lbl.style.color= isNew ? '#e06020' : '#aaa';

  document.getElementById('cardNo').textContent='No.'+stone.spec.no;

  const badge=document.getElementById('rarityBadge');
  badge.textContent=stone.rarity.name;
  badge.className='card-rarity-badge rarity-'+stone.rarity.name;

  const cvs=document.getElementById('resultCanvas');
  drawStoneOnCanvas(cvs,stone);

  document.getElementById('cardName').textContent=stone.spec.name;
  document.getElementById('cardSite').textContent='📍 '+stone.spec.site;

  const infoRow=document.getElementById('cardInfoRow');
  infoRow.innerHTML=`
    <div class="info-chip">${stone.spec.h}×${stone.spec.w} cm</div>
    <div class="info-chip state-chip" style="--state-bg:${stone.state.chipBg};--state-color:${stone.state.color}">${stone.state.name}</div>
  `;
  document.getElementById('cardNote').textContent=stone.spec.note;

  document.getElementById('stoneCard').style.background=stone.state.bg;

  const card=document.getElementById('stoneCard');
  card.style.animation='none'; card.offsetHeight; card.style.animation='';

  if(isNew&&stone.rarity.stars>=3) setTimeout(()=>launchConfetti(),400);
}

// ── Collection ────────────────────────────────────────────────────────────────
function goCollection() { stopScan(); showScreen('colScreen'); renderCollection(); }
function renderCollection() {
  const col=loadCollection();
  const total=SPECIMENS.length;
  const got=col.length;
  document.getElementById('colCountBadge').textContent=`${got}/${total}`;
  document.getElementById('colProgBar').style.width=(got/total*100)+'%';
  document.getElementById('colProgLabel').textContent=`${got} / ${total} 体`;

  const grid=document.getElementById('colGrid');
  grid.innerHTML='';
  if(col.length===0){
    grid.innerHTML='<div class="col-empty">まだ石棒がない…<br>バーコードをスキャンして<br>石棒を集めよう！</div>';
    return;
  }
  // 図鑑順（No.順）に表示
  const map=Object.fromEntries(col.map(s=>[s.spec.no,s]));
  SPECIMENS.forEach(spec=>{
    const stone=map[spec.no];
    const item=document.createElement('div');
    item.className='col-item';

    if(stone){
      item.style.background=STATES[spec.stateIdx].bg;
      const cvs=document.createElement('canvas');
      cvs.width=52; cvs.height=84; cvs.style.cssText='width:52px;height:84px';
      item.appendChild(cvs);
      item.innerHTML+=`<div class="col-item-name">${spec.name}</div><div class="col-item-no">No.${spec.no}</div>`;
      if(stone.isNew){const nb=document.createElement('div');nb.className='col-item-new';nb.textContent='NEW';item.appendChild(nb);}
      if((stone.count||1)>1){const cb=document.createElement('div');cb.className='col-item-dup';cb.textContent='×'+stone.count;item.appendChild(cb);}
      item.addEventListener('click',()=>openDetail(stone));
      grid.appendChild(item);
      drawStoneOnCanvas(cvs,stone);
    } else {
      // 未発見：シルエット
      item.style.background='#f0ece8';
      item.style.opacity='.45';
      item.innerHTML=`
        <div style="width:52px;height:84px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#ccc">?</div>
        <div class="col-item-name" style="color:#ccc">${spec.name}</div>
        <div class="col-item-no" style="color:#ddd">No.${spec.no}</div>`;
      grid.appendChild(item);
    }
  });

  // clear isNew flags
  saveCollection(col.map(s=>({...s,isNew:false})));
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function openDetail(stone) {
  const modal=document.getElementById('detailModal');
  const inner=document.getElementById('detailInner');
  inner.innerHTML=`
    <div class="detail-close-row"><button class="detail-close" onclick="closeDetail()">✕</button></div>
    <div class="card-header" style="width:100%;padding:0 14px 8px">
      <span class="card-no">No.${stone.spec.no}</span>
      <span class="card-rarity-badge rarity-${stone.rarity.name}">${stone.rarity.name}</span>
    </div>
    <div class="card-stone-area"><canvas id="detailCanvas" width="100" height="160"></canvas></div>
    <div class="card-body" style="width:100%;padding:0 18px 20px">
      <div class="card-name">${stone.spec.name}</div>
      <div class="card-site">📍 ${stone.spec.site}</div>
      <div class="card-info-row">
        <div class="info-chip">${stone.spec.h}×${stone.spec.w} cm</div>
        <div class="info-chip state-chip" style="--state-bg:${stone.state.chipBg};--state-color:${stone.state.color}">${stone.state.name}</div>
      </div>
      <div class="card-note">${stone.spec.note}</div>
      ${(stone.count||1)>1?`<div style="font-size:.72rem;color:#bbb;margin-top:8px">所持数：${stone.count}本</div>`:''}
    </div>`;
  modal.classList.add('on');
  drawStoneOnCanvas(document.getElementById('detailCanvas'),stone);
}
function closeDetail(e) {
  if(!e||e.target===document.getElementById('detailModal'))
    document.getElementById('detailModal').classList.remove('on');
}

// ── Confetti ──────────────────────────────────────────────────────────────────
let confettiAnim=null;
function launchConfetti() {
  const cvs=document.getElementById('confettiCanvas');
  cvs.width=window.innerWidth; cvs.height=window.innerHeight;
  const ctx=cvs.getContext('2d');
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*cvs.width, y:-10-Math.random()*40,
    vy:2+Math.random()*4, vx:(Math.random()-.5)*3,
    rot:Math.random()*Math.PI*2, rv:(Math.random()-.5)*.2,
    w:6+Math.random()*8, h:3+Math.random()*5,
    col:['#ffcc00','#ff6b6b','#4ecdc4','#ffffff','#ffaa44'][Math.floor(Math.random()*5)],
  }));
  if(confettiAnim) cancelAnimationFrame(confettiAnim);
  function frame(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    let alive=false;
    for(const p of pieces){
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv;
      if(p.y<cvs.height+20) alive=true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.col;
      ctx.globalAlpha=Math.min(1,(cvs.height-p.y)/cvs.height*3);
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
    if(alive) confettiAnim=requestAnimationFrame(frame);
    else{ctx.clearRect(0,0,cvs.width,cvs.height);confettiAnim=null;}
  }
  frame();
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateHomeCount();
</script>
