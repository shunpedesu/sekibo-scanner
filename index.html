<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石棒スキャナー</title>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { width:100%; height:100%; overflow:hidden; background:#fff8e7; font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Arial Rounded MT Bold',sans-serif; }

.screen { display:none; position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; }
.screen.active { display:flex; flex-direction:column; }

/* ── HOME ── */
#homeScreen {
  background:linear-gradient(160deg,#fff8e7 0%,#ffe4b5 100%);
  align-items:center; justify-content:center; padding:32px 24px;
}
.home-deco { font-size:5rem; margin-bottom:8px; animation:bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.home-title {
  font-size:2.2rem; font-weight:900; letter-spacing:.1em; color:#5c3317;
  text-shadow:3px 3px 0 #f0a040,5px 5px 0 rgba(0,0,0,.1);
  margin-bottom:6px; text-align:center;
}
.home-sub { font-size:.85rem; color:#a07040; letter-spacing:.1em; margin-bottom:8px; text-align:center; line-height:1.6; }
.home-credit { font-size:.68rem; color:#c0a070; margin-bottom:28px; text-align:center; }
.home-thumbs { display:flex; gap:6px; margin-bottom:32px; justify-content:center; }
.home-thumb { width:52px; height:38px; border-radius:8px; object-fit:cover; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.home-thumb-placeholder { width:52px; height:38px; border-radius:8px; background:#e8e0d0; }
.big-btn {
  width:220px; padding:18px; font-size:1.2rem; font-weight:900; letter-spacing:.2em;
  border:none; border-radius:50px; cursor:pointer;
  transition:transform .15s,box-shadow .15s; box-shadow:0 6px 0 rgba(0,0,0,.2);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.big-btn:active { transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.2); }
.btn-scan       { background:linear-gradient(135deg,#ff6b6b,#ff8e53); color:#fff; margin-bottom:14px; }
.btn-collection { background:linear-gradient(135deg,#4ecdc4,#44b3ac); color:#fff; }
.collection-count { margin-top:16px; font-size:.8rem; color:#b08040; letter-spacing:.1em; }

/* ── SCAN ── */
#scanScreen { background:#111; }
.scan-header { display:flex; align-items:center; padding:16px; background:rgba(0,0,0,.6); z-index:10; position:relative; }
.back-btn { background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:50%; width:38px; height:38px; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.scan-title { flex:1; text-align:center; color:#fff; font-size:1rem; letter-spacing:.15em; font-weight:700; }
.video-wrap { position:relative; flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; }
#scanVideo { width:100%; height:100%; object-fit:cover; display:block; }
.scan-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.scan-frame { width:min(280px,80vw); height:min(140px,40vw); position:relative; }
.scan-frame::before,.scan-frame::after,.scan-corner-br,.scan-corner-bl { content:''; position:absolute; width:28px; height:28px; border-color:#ffcc00; border-style:solid; }
.scan-frame::before { top:0;left:0;border-width:4px 0 0 4px;border-radius:6px 0 0 0; }
.scan-frame::after  { top:0;right:0;border-width:4px 4px 0 0;border-radius:0 6px 0 0; }
.scan-corner-br { bottom:0;right:0;border-width:0 4px 4px 0;border-radius:0 0 6px 0; }
.scan-corner-bl { bottom:0;left:0;border-width:0 0 4px 4px;border-radius:0 0 0 6px; }
.scan-line { position:absolute; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,#ffcc00,transparent); border-radius:2px; animation:scanMove 1.8s ease-in-out infinite; top:0; }
@keyframes scanMove { 0%{top:0%;opacity:1} 50%{top:100%;opacity:1} 51%{top:100%;opacity:0} 52%{top:0%;opacity:0} 53%{top:0%;opacity:1} 100%{top:0%;opacity:1} }
.scan-hint { position:absolute; bottom:24px; left:0; right:0; text-align:center; color:rgba(255,255,255,.8); font-size:.85rem; letter-spacing:.1em; background:rgba(0,0,0,.4); padding:10px; }
.scan-result-flash { position:absolute; inset:0; background:rgba(255,255,220,.9); opacity:0; pointer-events:none; transition:opacity .1s; }
.scan-result-flash.on { opacity:1; }

/* ── RESULT ── */
#resultScreen { background:linear-gradient(160deg,#fff8e7,#ffe4b5); align-items:center; }
.result-header { width:100%; display:flex; align-items:center; padding:16px; background:rgba(255,255,255,.5); }
.result-body { flex:1; display:flex; flex-direction:column; align-items:center; padding:12px 24px 24px; width:100%; max-width:380px; margin:0 auto; }
.result-new-label { font-size:.85rem; letter-spacing:.15em; margin-bottom:10px; font-weight:700; }

/* ── Stone Card ── */
.stone-card {
  background:#fff; border-radius:20px; width:100%; max-width:300px;
  box-shadow:0 8px 32px rgba(0,0,0,.13); overflow:hidden; position:relative;
  animation:cardPop .5s cubic-bezier(.17,.89,.32,1.28) both;
}
@keyframes cardPop { from{transform:scale(0) rotate(-5deg);opacity:0} to{transform:scale(1);opacity:1} }

.card-header { padding:10px 14px 8px; display:flex; justify-content:space-between; align-items:center; }
.card-no { font-size:.68rem; color:#ccc; letter-spacing:.1em; font-family:monospace; }
.card-rarity-badge { font-size:.7rem; font-weight:900; letter-spacing:.08em; padding:3px 10px; border-radius:20px; }
.rarity-ふつう    { background:#e8e8e8; color:#888; }
.rarity-めずらしい{ background:#c8eaf8; color:#2288aa; }
.rarity-レア      { background:linear-gradient(135deg,#ffe066,#ffaa00); color:#7a5000; }
.rarity-でんせつ  { background:linear-gradient(135deg,#ee88ff,#aa44ff); color:#fff; animation:legendGlow 1.5s ease-in-out infinite; }
@keyframes legendGlow { 0%,100%{box-shadow:0 0 8px rgba(180,80,255,.4)} 50%{box-shadow:0 0 18px rgba(180,80,255,.9)} }

.stone-thumb-wrap { background:#f0ece6; display:flex; align-items:center; justify-content:center; height:160px; overflow:hidden; }
.stone-thumb { width:100%; height:160px; object-fit:contain; display:block; }
.stone-thumb-err { display:flex; align-items:center; justify-content:center; height:160px; font-size:2.5rem; background:#f0ece6; }

.card-body { padding:12px 16px 16px; }
.card-name { font-size:1.15rem; font-weight:900; color:#2a1a0a; letter-spacing:.04em; margin-bottom:2px; line-height:1.3; }
.card-ref  { font-size:.68rem; color:#bbb; letter-spacing:.06em; margin-bottom:8px; font-family:monospace; }
.card-site { font-size:.72rem; color:#aaa; letter-spacing:.06em; margin-bottom:10px; }

.card-info-row { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:10px; }
.info-chip { border-radius:20px; padding:4px 11px; font-size:.7rem; font-weight:700; letter-spacing:.04em; }
.chip-state-0 { background:#f0ece6; color:#9a7860; }
.chip-state-1 { background:#e8e4dc; color:#7a6040; }
.chip-state-2 { background:#e4e0d8; color:#5a5040; }
.chip-state-3 { background:#e0ddd5; color:#3a3028; }

.card-sketchfab-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:9px; border:1.5px solid #e0d8cc; border-radius:10px;
  background:none; font-size:.75rem; color:#a08860; letter-spacing:.1em;
  cursor:pointer; font-family:inherit; font-weight:700; transition:background .15s;
  text-decoration:none;
}
.card-sketchfab-btn:hover { background:#f8f4ee; }

/* ── result buttons ── */
.result-btns { display:flex; flex-direction:column; gap:10px; width:100%; max-width:280px; margin-top:16px; }
.result-btn { padding:14px; font-size:1rem; font-weight:900; letter-spacing:.15em; border:none; border-radius:40px; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.15); transition:transform .1s,box-shadow .1s; }
.result-btn:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
.btn-again { background:linear-gradient(135deg,#ff6b6b,#ff8e53); color:#fff; }
.btn-col   { background:linear-gradient(135deg,#4ecdc4,#44b3ac); color:#fff; }

/* ── COLLECTION ── */
#colScreen { background:linear-gradient(160deg,#fff8e7,#ffe4b5); }
.col-header { display:flex; align-items:center; padding:16px; background:rgba(255,255,255,.6); position:sticky; top:0; z-index:10; backdrop-filter:blur(8px); }
.col-title { flex:1; text-align:center; font-size:1rem; letter-spacing:.2em; color:#5c3317; font-weight:900; }
.col-count-badge { background:#ff6b6b; color:#fff; border-radius:20px; padding:3px 10px; font-size:.75rem; font-weight:900; }
.col-progress { padding:8px 16px 2px; display:flex; align-items:center; gap:10px; }
.col-prog-track { flex:1; height:6px; background:#e8e0d0; border-radius:3px; overflow:hidden; }
.col-prog-bar   { height:100%; background:linear-gradient(90deg,#ff8e53,#ff6b6b); border-radius:3px; transition:width .4s; }
.col-prog-label { font-size:.7rem; color:#b08040; white-space:nowrap; }

.col-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:10px 12px 24px; }
.col-item {
  background:#fff; border-radius:12px; overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.08); cursor:pointer;
  transition:transform .15s; position:relative;
  display:flex; flex-direction:column;
}
.col-item:active { transform:scale(.95); }
.col-item-img { width:100%; height:64px; object-fit:cover; background:#f0ece6; display:block; }
.col-item-body { padding:5px 6px 6px; }
.col-item-name { font-size:.6rem; font-weight:900; color:#2a1a0a; line-height:1.3; }
.col-item-no   { font-size:.52rem; color:#ccc; font-family:monospace; }
.col-item-new  { position:absolute; top:3px; right:3px; background:#ff6b6b; color:#fff; font-size:.5rem; font-weight:900; padding:2px 5px; border-radius:8px; }
.col-item-dup  { position:absolute; bottom:4px; right:5px; font-size:.52rem; color:#bbb; }
.col-item-mystery { background:#f0ece8; display:flex; flex-direction:column; align-items:center; }
.col-item-mystery .mystery-icon { width:100%; height:64px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:#d8d0c8; background:#f0ece8; }
.col-item-mystery .col-item-name { color:#ccc; text-align:center; width:100%; }
.col-empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:#c0a080; font-size:.9rem; letter-spacing:.1em; line-height:2; }

/* ── Detail modal ── */
#detailModal { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.6); align-items:center; justify-content:center; padding:20px; }
#detailModal.on { display:flex; }
.detail-inner { background:#fff; border-radius:20px; width:100%; max-width:300px; max-height:90vh; overflow-y:auto; animation:cardPop .3s ease both; }
.detail-close-row { display:flex; justify-content:flex-end; padding:10px 12px 0; }
.detail-close { background:none; border:none; font-size:1.3rem; color:#ccc; cursor:pointer; }

/* ── Toast ── */
#toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:rgba(40,20,0,.85); color:#fff; padding:10px 24px; border-radius:30px; font-size:.85rem; letter-spacing:.1em; z-index:200; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; }
#confettiCanvas { position:fixed; inset:0; pointer-events:none; z-index:50; }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="home-deco">🪨</div>
  <div class="home-title">石棒スキャナー</div>
  <div class="home-sub">バーコードから縄文の石棒を発掘せよ</div>
  <div class="home-credit">3Dデータ提供：石棒クラブ／飛騨みやがわ考古民俗館</div>
  <div class="home-thumbs" id="homeThumbs"></div>
  <button class="big-btn btn-scan" onclick="goScan()">📷 スキャンする</button>
  <button class="big-btn btn-collection" onclick="goCollection()">📚 図鑑を見る</button>
  <div class="collection-count" id="homeCount"></div>
</div>

<!-- SCAN -->
<div class="screen" id="scanScreen">
  <div class="scan-header">
    <button class="back-btn" onclick="stopScan()">✕</button>
    <div class="scan-title">バーコードをスキャン</div>
    <div style="width:38px"></div>
  </div>
  <div class="video-wrap">
    <video id="scanVideo" playsinline muted></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="scan-corner-br"></div>
        <div class="scan-corner-bl"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scan-hint">商品・本などのバーコードを枠に合わせてね</div>
    <div class="scan-result-flash" id="scanFlash"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="result-header">
    <button class="back-btn" style="background:rgba(0,0,0,.1);color:#5c3317" onclick="goHome()">✕</button>
  </div>
  <div class="result-body">
    <div class="result-new-label" id="resultLabel"></div>
    <div class="stone-card" id="stoneCard">
      <div class="card-header">
        <span class="card-no" id="cardNo"></span>
        <span class="card-rarity-badge" id="rarityBadge"></span>
      </div>
      <div class="stone-thumb-wrap" id="thumbWrap">
        <img id="resultThumb" class="stone-thumb" src="" alt="">
      </div>
      <div class="card-body">
        <div class="card-name" id="cardName"></div>
        <div class="card-ref"  id="cardRef"></div>
        <div class="card-site" id="cardSite"></div>
        <div class="card-info-row" id="cardInfoRow"></div>
        <a id="cardSketchfabBtn" class="card-sketchfab-btn" target="_blank" rel="noopener">
          🔲 Sketchfabで3Dを見る
        </a>
      </div>
    </div>
    <div class="result-btns">
      <button class="result-btn btn-again" onclick="goScan()">📷 もう一度スキャン</button>
      <button class="result-btn btn-col"   onclick="goCollection()">📚 図鑑を見る</button>
    </div>
  </div>
</div>

<!-- COLLECTION -->
<div class="screen" id="colScreen">
  <div class="col-header">
    <button class="back-btn" style="background:rgba(0,0,0,.1);color:#5c3317" onclick="goHome()">←</button>
    <div class="col-title">石棒図鑑</div>
    <div class="col-count-badge" id="colCountBadge">0/21</div>
  </div>
  <div class="col-progress">
    <div class="col-prog-track"><div class="col-prog-bar" id="colProgBar" style="width:0%"></div></div>
    <div class="col-prog-label" id="colProgLabel">0 / 21 体</div>
  </div>
  <div class="col-grid" id="colGrid"></div>
</div>

<!-- Detail Modal -->
<div id="detailModal" onclick="closeDetail(event)">
  <div class="detail-inner" id="detailInner"></div>
</div>

<div id="toast"></div>
<canvas id="confettiCanvas"></canvas>

const STATES   = ['原石','剥離','敲打','研磨'];
const STATE_CHIP_CLASS = ['chip-state-0','chip-state-1','chip-state-2','chip-state-3'];
const RARITY   = ['ふつう','めずらしい','レア','でんせつ'];
const TOTAL    = SPECIMENS.length;

// ── Hash ─────────────────────────────────────────────────────────────────────
function hashCode(str) {
  let h = 2166136261;
  for (let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=(h*16777619)>>>0;}
  return h;
}

// ── Generate stone from barcode ───────────────────────────────────────────────
function generateStone(barcode) {
  const h = hashCode(barcode);
  const spec = SPECIMENS[h % TOTAL];
  return { barcode, id:h.toString(16).padStart(8,'0'), spec, ts:Date.now(), isNew:true };
}

// ── Collection ────────────────────────────────────────────────────────────────
function loadCollection() { try{return JSON.parse(localStorage.getItem('sekiboCol')||'[]')}catch{return[]} }
function saveCollection(col) { localStorage.setItem('sekiboCol',JSON.stringify(col)); }
function addToCollection(stone) {
  const col=loadCollection();
  const ex=col.find(s=>s.spec.no===stone.spec.no);
  if(ex){ex.count=(ex.count||1)+1;saveCollection(col);return false;}
  stone.count=1;col.unshift(stone);saveCollection(col);return true;
}

// ── Screens ───────────────────────────────────────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){stopScan();showScreen('homeScreen');updateHomeCount();}

function updateHomeCount(){
  const col=loadCollection();
  document.getElementById('homeCount').textContent=
    col.length===0?'まだ石棒がない。スキャンしてみよう！':`図鑑：${col.length} / ${TOTAL} 体`;
  renderHomeThumbs(col.slice(0,5));
}
function renderHomeThumbs(col){
  const wrap=document.getElementById('homeThumbs');
  wrap.innerHTML='';
  col.forEach(s=>{
    const img=document.createElement('img');
    img.src=s.spec.thumb; img.className='home-thumb'; img.alt=s.spec.name;
    img.onerror=()=>{img.style.display='none';};
    wrap.appendChild(img);
  });
}

// ── Scan ──────────────────────────────────────────────────────────────────────
let codeReader=null,scanning=false;
async function goScan(){showScreen('scanScreen');await startScan();}
async function startScan(){
  if(scanning)return;
  try{
    codeReader=new ZXing.BrowserMultiFormatReader();scanning=true;
    await codeReader.decodeFromVideoDevice(null,'scanVideo',(result,err)=>{
      if(result&&scanning){scanning=false;onBarcodeDetected(result.getText());}
    });
  }catch(e){showToast('カメラを起動できませんでした');goHome();}
}
function stopScan(){
  scanning=false;
  if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}
}
function onBarcodeDetected(barcode){
  stopScan();
  const flash=document.getElementById('scanFlash');
  flash.classList.add('on');setTimeout(()=>flash.classList.remove('on'),200);
  setTimeout(()=>{const stone=generateStone(barcode);const isNew=addToCollection(stone);showResult(stone,isNew);},300);
}

// ── Result ────────────────────────────────────────────────────────────────────
function showResult(stone,isNew){
  showScreen('resultScreen');
  const spec=stone.spec;

  const lbl=document.getElementById('resultLabel');
  lbl.textContent=isNew?'✨ あたらしい石棒を発掘！':'📦 すでに持っている石棒だ！';
  lbl.style.color=isNew?'#e06020':'#aaa';

  document.getElementById('cardNo').textContent='No.'+spec.no;
  const badge=document.getElementById('rarityBadge');
  badge.textContent=RARITY[spec.rarityIdx];
  badge.className='card-rarity-badge rarity-'+RARITY[spec.rarityIdx];

  const img=document.getElementById('resultThumb');
  img.src=spec.thumb; img.alt=spec.name;

  document.getElementById('cardName').textContent=spec.name;
  document.getElementById('cardRef').textContent=spec.ref;
  document.getElementById('cardSite').textContent='📍 '+spec.site;

  document.getElementById('cardInfoRow').innerHTML=
    `<span class="info-chip ${STATE_CHIP_CLASS[spec.stateIdx]}">${STATES[spec.stateIdx]}</span>`;

  document.getElementById('cardSketchfabBtn').href='https://sketchfab.com/3d-models/'+spec.uid;

  const card=document.getElementById('stoneCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='';

  if(isNew&&spec.rarityIdx>=2) setTimeout(()=>launchConfetti(),400);
}

// ── Collection ────────────────────────────────────────────────────────────────
function goCollection(){stopScan();showScreen('colScreen');renderCollection();}
function renderCollection(){
  const col=loadCollection();
  const got=col.length;
  document.getElementById('colCountBadge').textContent=`${got}/${TOTAL}`;
  document.getElementById('colProgBar').style.width=(got/TOTAL*100)+'%';
  document.getElementById('colProgLabel').textContent=`${got} / ${TOTAL} 体`;

  const grid=document.getElementById('colGrid');
  grid.innerHTML='';
  if(got===0){grid.innerHTML='<div class="col-empty">まだ石棒がない…<br>バーコードをスキャンして<br>石棒を集めよう！</div>';return;}

  const map=Object.fromEntries(col.map(s=>[s.spec.no,s]));
  SPECIMENS.forEach(spec=>{
    const stone=map[spec.no];
    const item=document.createElement('div');
    item.className='col-item';
    if(stone){
      item.innerHTML=`
        <img class="col-item-img" src="${spec.thumb}" alt="${spec.name}" onerror="this.style.background='#e0ddd5'">
        <div class="col-item-body">
          <div class="col-item-name">${spec.name} ${spec.ref}</div>
          <div class="col-item-no">No.${spec.no}</div>
        </div>`;
      if(stone.isNew){const nb=document.createElement('div');nb.className='col-item-new';nb.textContent='NEW';item.appendChild(nb);}
      if((stone.count||1)>1){const cb=document.createElement('div');cb.className='col-item-dup';cb.textContent='×'+stone.count;item.appendChild(cb);}
      item.addEventListener('click',()=>openDetail(stone));
    }else{
      item.classList.add('col-item-mystery');
      item.innerHTML=`<div class="mystery-icon">？</div><div class="col-item-body"><div class="col-item-name" style="color:#ccc">???</div><div class="col-item-no" style="color:#ddd">No.${spec.no}</div></div>`;
    }
    grid.appendChild(item);
  });
  saveCollection(col.map(s=>({...s,isNew:false})));
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function openDetail(stone){
  const spec=stone.spec;
  document.getElementById('detailInner').innerHTML=`
    <div class="detail-close-row"><button class="detail-close" onclick="closeDetail()">✕</button></div>
    <div class="card-header">
      <span class="card-no">No.${spec.no}</span>
      <span class="card-rarity-badge rarity-${RARITY[spec.rarityIdx]}">${RARITY[spec.rarityIdx]}</span>
    </div>
    <div class="stone-thumb-wrap"><img class="stone-thumb" src="${spec.thumb}" alt="${spec.name}"></div>
    <div class="card-body">
      <div class="card-name">${spec.name}</div>
      <div class="card-ref">${spec.ref}</div>
      <div class="card-site">📍 ${spec.site}</div>
      <div class="card-info-row"><span class="info-chip ${STATE_CHIP_CLASS[spec.stateIdx]}">${STATES[spec.stateIdx]}</span></div>
      <a class="card-sketchfab-btn" href="https://sketchfab.com/3d-models/${spec.uid}" target="_blank" rel="noopener">🔲 Sketchfabで3Dを見る</a>
      ${(stone.count||1)>1?`<div style="font-size:.72rem;color:#bbb;margin-top:10px">所持数：${stone.count}本</div>`:''}
    </div>`;
  document.getElementById('detailModal').classList.add('on');
}
function closeDetail(e){
  if(!e||e.target===document.getElementById('detailModal'))
    document.getElementById('detailModal').classList.remove('on');
}

// ── Confetti ──────────────────────────────────────────────────────────────────
let confettiAnim=null;
function launchConfetti(){
  const cvs=document.getElementById('confettiCanvas');
  cvs.width=window.innerWidth;cvs.height=window.innerHeight;
  const ctx=cvs.getContext('2d');
  const pieces=Array.from({length:80},()=>({
    x:Math.random()*cvs.width,y:-10-Math.random()*40,
    vy:2+Math.random()*4,vx:(Math.random()-.5)*3,
    rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.2,
    w:6+Math.random()*8,h:3+Math.random()*5,
    col:['#ffcc00','#ff6b6b','#4ecdc4','#ffffff','#ffaa44'][Math.floor(Math.random()*5)],
  }));
  if(confettiAnim)cancelAnimationFrame(confettiAnim);
  function frame(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    let alive=false;
    for(const p of pieces){
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;
      if(p.y<cvs.height+20)alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.col;ctx.globalAlpha=Math.min(1,(cvs.height-p.y)/cvs.height*3);
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    }
    if(alive)confettiAnim=requestAnimationFrame(frame);
    else{ctx.clearRect(0,0,cvs.width,cvs.height);confettiAnim=null;}
  }
  frame();
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

updateHomeCount();
